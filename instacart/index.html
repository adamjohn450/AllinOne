<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in - Instacart</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Graphik:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="https://www.instacart.com/assets/beetstrap/brand/2022/instacart-logo-color@3x-6b71df83cfba8c6827f59bff009df3be6e96d484ebdc5da7e6122e9555eae9b6.png" alt="Instacart" />
            </div>
            <button class="signup-button">Sign up</button>
        </div>

        <div class="content">
            <h1 class="title">Log in</h1>
            
            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="phone-email" 
                        class="input-field" 
                        placeholder="Enter your email address"
                        autocomplete="username"
                        required
                    />
                </div>

                <button type="submit" class="submit-button">
                    Continue
                </button>
            </form>

            <div class="divider">
                <span>Or continue with</span>
            </div>

            <div class="social-buttons">
                <button class="social-button phone-button" id="phoneToggle">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M3.22 6.92C4.5 9.22 6.56 11.27 8.86 12.56L10.7 10.72C10.93 10.49 11.27 10.41 11.57 10.52C12.53 10.84 13.57 11.01 14.67 11.01C15.12 11.01 15.5 11.39 15.5 11.84V14.67C15.5 15.12 15.12 15.5 14.67 15.5C6.57 15.5 0 8.93 0 0.83C0 0.38 0.38 0 0.83 0H3.67C4.12 0 4.5 0.38 4.5 0.83C4.5 1.94 4.67 2.98 4.99 3.94C5.09 4.24 5.02 4.57 4.78 4.81L3.22 6.92Z" fill="currentColor"/>
                    </svg>
                    <span>Phone</span>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
