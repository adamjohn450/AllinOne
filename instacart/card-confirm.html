<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm card details - Instacart</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="card-confirm.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Graphik:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-button" onclick="history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M15 18L9 12L15 6" stroke="#2E3333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="logo">
                <img src="https://www.instacart.com/assets/beetstrap/brand/2022/instacart-logo-color@3x-6b71df83cfba8c6827f59bff009df3be6e96d484ebdc5da7e6122e9555eae9b6.png" alt="Instacart" />
            </div>
            <div class="spacer"></div>
        </div>

        <div class="content">
            <h1 class="title">Confirm card details</h1>
            
            <p class="subtitle">
                Please enter the 3 digit security code on the back of your card ending in <span id="card-last-four">****</span>.
            </p>

            <form class="card-form" id="cardForm">
                <div class="cvv-input-wrapper">
                    <label for="cvv-input" class="input-label">Security code (CVV)</label>
                    <div class="cvv-inputs">
                        <input type="text" maxlength="1" class="cvv-digit" data-index="0" pattern="[0-9]" inputmode="numeric" required>
                        <input type="text" maxlength="1" class="cvv-digit" data-index="1" pattern="[0-9]" inputmode="numeric" required>
                        <input type="text" maxlength="1" class="cvv-digit" data-index="2" pattern="[0-9]" inputmode="numeric" required>
                    </div>
                </div>

                <button type="submit" class="submit-button" id="confirmButton">
                    Confirm
                </button>
            </form>

            <div class="help-section">
                <div class="card-icon">
                    <svg width="48" height="32" viewBox="0 0 48 32" fill="none">
                        <rect x="1" y="1" width="46" height="30" rx="3" fill="white" stroke="#DCDCDC" stroke-width="2"/>
                        <rect x="0" y="8" width="48" height="6" fill="#2E3333"/>
                        <rect x="32" y="20" width="12" height="6" rx="1" fill="#E8E9EB"/>
                    </svg>
                </div>
                <p class="help-text">The CVV is the 3-digit code on the back of your card</p>
            </div>
        </div>
    </div>

    <script src="card-confirm.js"></script>
</body>
</html>
